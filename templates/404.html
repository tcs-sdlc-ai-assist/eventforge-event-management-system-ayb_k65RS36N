{% extends "base.html" %}

{% block title %}Page Not Found — EventForge{% endblock %}

{% block content %}
<div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-16 sm:py-24">
    <div class="text-center">
        <p class="text-base font-semibold text-primary-600">404</p>
        <h1 class="mt-4 text-3xl font-bold tracking-tight text-gray-900 sm:text-5xl">Page not found</h1>
        <p class="mt-6 text-base leading-7 text-gray-600">Sorry, we couldn't find the page you're looking for. The resource may have been moved, deleted, or never existed.</p>
        <div class="mt-10 flex items-center justify-center gap-x-6">
            <a href="/events" class="rounded-md bg-primary-600 px-3.5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-colors">Browse Events</a>
            <a href="/" class="text-sm font-semibold text-gray-900 hover:text-gray-700 transition-colors">Go home <span aria-hidden="true">&rarr;</span></a>
        </div>
    </div>
</div>
{% endblock %}
